name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler.cc }} / ${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        config: [Debug, RelWithDebInfo]
        compiler:
          - { cc: gcc,   cxx: g++ }
          - { cc: clang, cxx: clang++ }
        exclude:
          # macOS uses AppleClang; the gcc image points at clang anyway.
          - os: macos-14
            compiler: { cc: gcc, cxx: g++ }
    env:
      CC:  ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake \
            ${{ matrix.compiler.cc }}

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja cmake

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 120

  windows:
    # First-class MSVC coverage: core + HTTP transport + tests.
    # StdioTransport is POSIX-only and is gated out of Windows builds
    # (see src/CMakeLists.txt); everything else must compile clean.
    name: windows-latest / msvc / ${{ matrix.config }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, RelWithDebInfo]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        # Warnings-as-errors stays off until the MSVC warning surface has
        # been triaged once — this is the SDK's first MSVC compiler ever.
        run: cmake -B build -DMCP_BUILD_EXAMPLES=OFF -DMCP_WARNINGS_AS_ERRORS=OFF

      - name: Build
        run: cmake --build build --config ${{ matrix.config }} --parallel

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.config }} --output-on-failure --timeout 120

  sanitizers:
    name: sanitizers / ${{ matrix.sanitizer }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan, tsan]
    env:
      CC:  clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake clang

      # TSan needs the entire std machinery instrumented. With the default
      # libstdc++ (uninstrumented, precompiled) TSan cannot see the atomic
      # refcount / happens-before edges inside libstdc++'s exception_ptr
      # (std::__exception_ptr::exception_ptr::_M_release → free), and flags a
      # false-positive data race on the plain ~promise teardown in
      # Session::send_request_for<T>. That is exactly what flaked run
      # 28716770512 (top frames all in uninstrumented libstdc++.so.6). Building
      # against libc++ — whose std headers are inlined and therefore
      # TSan-instrumented — closes that blind spot. macOS/libc++ TSan runs were
      # clean 20+ times; no suppression file is used.
      - name: Install libc++ (tsan)
        if: matrix.sanitizer == 'tsan'
        run: sudo apt-get install -y libc++-dev libc++abi-dev

      - name: Configure (asan)
        if: matrix.sanitizer == 'asan'
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DMCP_ENABLE_ASAN=ON

      - name: Configure (tsan)
        if: matrix.sanitizer == 'tsan'
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DMCP_ENABLE_TSAN=ON
          -DCMAKE_CXX_FLAGS=-stdlib=libc++
          -DCMAKE_EXE_LINKER_FLAGS=-stdlib=libc++

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 180

  install-and-consume:
    name: install + downstream consume
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake clang

      - name: Configure & build & install
        run: |
          cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DMCP_BUILD_TESTS=OFF -DMCP_BUILD_EXAMPLES=OFF
          cmake --build build
          cmake --install build

      - name: Build a tiny consumer
        run: |
          mkdir -p consumer && cd consumer
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(consumer LANGUAGES CXX)
          set(CMAKE_CXX_STANDARD 20)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          find_package(mcp REQUIRED)
          add_executable(consumer main.cpp)
          target_link_libraries(consumer PRIVATE mcp::mcp)
          EOF
          cat > main.cpp <<'EOF'
          #include <mcp/mcp.hpp>
          int main() {
              mcp::Server server{ mcp::Implementation{
                  .name = "downstream", .version = "0",
              }};
              (void)server;
              return 0;
          }
          EOF
          cmake -B build -G Ninja \
            -DCMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/install
          cmake --build build
          ./build/consumer
